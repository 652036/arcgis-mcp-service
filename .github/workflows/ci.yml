name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Syntax check
        run: |
          python -m compileall arcgis_pro_mcp
      - name: Unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"
